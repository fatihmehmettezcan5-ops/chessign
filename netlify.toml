[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/stockfish/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# API istekleri Netlify fonksiyonuna yonlendirilir; anahtarlar process.env'den okunur.
[[redirects]]
  from = "/api/nvidia"
  to = "/.netlify/functions/ai-coach"
  status = 200

[[redirects]]
  from = "/api/gemini"
  to = "/.netlify/functions/ai-coach"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
